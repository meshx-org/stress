name: update-version

# Regular version bump: resolve the latest Alpine 3.x and the stress-ng it ships,
# and update BOTH pins in the Dockerfile as a matched pair (so the pinned apk
# package always exists in the pinned base). That commit triggers a rebuild
# (publish.yaml) and is also the repo keepalive — a default-branch commit is what
# resets GitHub's 60-day scheduled-workflow disable timer; a heartbeat covers
# long upstream stalls. Major Alpine jumps (3 -> 4) are left to Dependabot.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC daily — catch new releases promptly

permissions:
  contents: write # commit the pin bump / heartbeat

concurrency:
  group: update-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve latest Alpine 3.x + its stress-ng
        id: latest
        run: |
          set -euo pipefail
          alpine_full=$(docker run --rm alpine:3 cat /etc/alpine-release) # 3.24.1
          alpine="${alpine_full%.*}"                                      # 3.24
          apk=$(docker run --rm "alpine:$alpine" sh -c 'apk update -q >/dev/null 2>&1; apk list stress-ng 2>/dev/null' \
                | grep -oE 'stress-ng-[0-9][^ ]*' | sed 's/^stress-ng-//' | sort -V | tail -1)
          [ -n "$alpine" ] && [ -n "$apk" ] || { echo "::error::could not resolve alpine/stress-ng"; exit 1; }
          echo "alpine=$alpine" >> "$GITHUB_OUTPUT"
          echo "apk=$apk"       >> "$GITHUB_OUTPUT"
          echo "==> alpine $alpine, stress-ng $apk"

      - name: Bump Dockerfile pins (or heartbeat)
        run: |
          set -euo pipefail
          alpine="${{ steps.latest.outputs.alpine }}"
          apk="${{ steps.latest.outputs.apk }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          sed -i -E "s|^ARG ALPINE_VERSION=.*|ARG ALPINE_VERSION=$alpine|" Dockerfile
          sed -i -E "s|^ARG STRESS_NG_VERSION=.*|ARG STRESS_NG_VERSION=$apk|" Dockerfile

          if ! git diff --quiet -- Dockerfile; then
            git add Dockerfile
            # No [skip ci]: we WANT this push to trigger publish and build the pins.
            git commit -m "chore: stress-ng $apk on alpine $alpine"
            git push origin HEAD:main
            echo "==> bumped pins to stress-ng $apk / alpine $alpine"
          else
            age=$(( ( $(date +%s) - $(git log -1 --format=%ct) ) / 86400 ))
            if [ "$age" -ge 50 ]; then
              git commit --allow-empty -m "chore: keepalive (${age}d idle) [skip ci]"
              git push origin HEAD:main
              echo "==> keepalive commit (${age}d idle)"
            else
              echo "pins already current (repo ${age}d idle) — nothing to do"
            fi
          fi
