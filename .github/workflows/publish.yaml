name: publish

# Build + push ghcr.io/meshx-org/stress at the versions pinned in the Dockerfile
# (ALPINE_VERSION + STRESS_NG_VERSION, kept current by update-version.yaml). Tags
# encode both, node-image style: :latest, :<version>, :<major.minor>,
# :<version>-alpine<alpine>, :sha-<short>, plus a matching git tag. Self-contained:
# only the built-in GITHUB_TOKEN.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/publish.yaml
  # Weekly rebuild so the pinned image still picks up Alpine base security patches
  # within the pinned minor even when the versions haven't moved.
  schedule:
    - cron: '0 6 * * 1' # 06:00 UTC every Monday

permissions:
  contents: write     # push the version git tag
  packages: write     # push image + cosign signature + attestations
  id-token: write     # keyless signing via Sigstore / GitHub OIDC
  attestations: write # SLSA provenance + SBOM attestations

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read pinned versions from the Dockerfile
        id: ver
        run: |
          set -euo pipefail
          alpine=$(grep -oE '^ARG ALPINE_VERSION=[0-9][0-9.]*' Dockerfile | head -1 | cut -d= -f2)
          apk=$(grep -oE '^ARG STRESS_NG_VERSION=[0-9][0-9A-Za-z.-]*' Dockerfile | head -1 | cut -d= -f2)
          [ -n "$alpine" ] && [ -n "$apk" ] || { echo "::error::could not read pinned versions"; exit 1; }
          version="${apk%-r*}" # 0.21.02-r0 -> 0.21.02
          {
            echo "alpine=$alpine"
            echo "version=$version"
            echo "minor=${version%.*}"
          } >> "$GITHUB_OUTPUT"
          echo "==> stress-ng $version (apk $apk) on alpine $alpine"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (version tags + label)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/${{ github.repository }} # ghcr.io/meshx-org/stress
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.minor }}
            type=raw,value=${{ steps.ver.outputs.version }}-alpine${{ steps.ver.outputs.alpine }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false # attach our own SLSA provenance below (keeps the manifest clean)
          sbom: false       # SBOM generated + attested below

      # --- Supply chain: keyless signature + SBOM + SLSA provenance (Sigstore OIDC) ---

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image (keyless)
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: stress-sbom.spdx.json # published as a workflow artifact

      - name: Attest SBOM to the image
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Tag the repo with the shipped stress-ng version. Idempotent: only creates
      # the tag the first time a given version is built.
      - name: Sync git tag to the stress-ng version
        run: |
          set -euo pipefail
          tag="v${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "git tag $tag already exists — in sync, nothing to do"
          else
            git tag "$tag"
            git push origin "$tag"
            echo "==> pushed git tag $tag"
          fi
