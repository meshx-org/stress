name: publish

# Build + push ghcr.io/meshx-org/stress, pinned to the stress-ng version recorded
# in the committed VERSION file (kept current by update-version.yaml). The build
# arg makes the image reproducible and in lockstep with the file; tags derive
# from it (:latest, :<version>, :<major.minor>, :sha-<short>) and a matching git
# tag is pushed. Self-contained: only the built-in GITHUB_TOKEN.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - VERSION
      - Dockerfile
      - .github/workflows/publish.yaml
  # Weekly rebuild so the pinned image still picks up alpine:3 base security
  # patches even when the stress-ng version hasn't moved.
  schedule:
    - cron: '0 6 * * 1' # 06:00 UTC every Monday

permissions:
  contents: write # push the version git tag
  packages: write # push the image

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read pinned stress-ng version
        id: ver
        run: |
          set -euo pipefail
          apk=$(tr -d ' \t\n' < VERSION)
          [ -n "$apk" ] || { echo "::error::VERSION is empty"; exit 1; }
          version="${apk%-r*}" # 0.21.02-r0 -> 0.21.02 (drop the alpine -rN suffix)
          echo "apk=$apk"           >> "$GITHUB_OUTPUT"
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"
          echo "==> building stress-ng $apk (tags from $version)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (version tags + label)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/${{ github.repository }} # ghcr.io/meshx-org/stress
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.minor }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            STRESS_NG_VERSION=${{ steps.ver.outputs.apk }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Tag the repo with the shipped stress-ng version. Idempotent: only creates
      # the tag the first time a given version is built.
      - name: Sync git tag to the stress-ng version
        run: |
          set -euo pipefail
          tag="v${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "git tag $tag already exists — in sync, nothing to do"
          else
            git tag "$tag"
            git push origin "$tag"
            echo "==> pushed git tag $tag"
          fi
